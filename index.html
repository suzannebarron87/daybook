<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Daybook App" name="Daybook app (editable)" subtitle="Full editable daily ledger — live balances, autosave" viewport="960x620" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daybook — Daily Financial Planning</title>
<meta name="description" content="Daybook — a daily financial planning ledger.">
<meta name="theme-color" content="#fdfcf8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daybook">
<style>
/* ============================================================
   DAYBOOK — Daily Financial Planning App
   Foundational tokens: color + typography
   Derived directly from the Daily Money Ledger reference artifact.

   Aesthetic: editorial financial almanac. Paper & ink, a single gold
   accent, account color-coding, and monospace figures. Mostly square
   corners, hairline rules, restrained shadows.
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');

:root {
  /* ---------- CORE PALETTE ---------- */
  --ink: #1a1a1a;          /* primary text + inverse (dark) surfaces */
  --paper: #fdfcf8;        /* app background — warm off-white "paper" */
  --card: #ffffff;         /* raised card surface */
  --rule: #e7e3d8;         /* hairline dividers & borders */
  --gold: #b8893a;         /* the single brand accent */

  /* warm neutral surfaces (subtle stratification of "paper") */
  --warm-1: #faf8f2;       /* day headers, day notes, log month cells */
  --warm-2: #f8f5ec;       /* end-of-day band */

  /* ---------- NEUTRAL TEXT SCALE ---------- */
  --fg-1: #1a1a1a;         /* primary */
  --fg-2: #444444;         /* body secondary / list copy */
  --fg-3: #666666;         /* muted captions, subheads */
  --fg-4: #777777;         /* notes, italic asides */
  --fg-5: #999999;         /* faint — line numbers, dates */
  --fg-6: #cccccc;         /* faintest — blank/placeholder marks */
  --fg-on-ink: #fdfcf8;    /* text on the dark ink surface */
  --fg-on-ink-dim: rgba(255,255,255,0.7);

  /* ---------- SEMANTIC / ACCOUNT COLOR-CODING ---------- */
  /* Money in / positive */
  --pos: #15803d;
  --pos-tint: #f0fdf4;     /* section background */
  --pos-chip-bg: #dcfce7;  /* chip / tag background */

  /* Business account (amber/brown) */
  --biz: #92400e;
  --biz-tint: #fef3e2;

  /* Personal account (red) */
  --person: #9b2c2c;
  --person-tint: #fde8e8;

  /* Pending / awaiting clearance (amber-yellow) */
  --pending: #92400e;
  --pending-bg: #fef3c7;

  /* Savings pot (deep brown) */
  --pot: #7c2d12;
  --pot-bg: #fef3c7;
  --savings-tint: #fffbeb;

  /* Info / start-of-day (slate blue) */
  --info: #1e3a5f;
  --info-tint: #eef4f9;

  /* System / automated ("⚡ AUTO" — indigo) */
  --auto: #3730a3;
  --auto-bg: #e7e9fb;
  --auto-accent: #6366f1;

  /* Special / ministry / first-fruits (violet) */
  --special: #6b21a8;
  --special-bg: #f5e6ff;

  /* Warning / attention (red) */
  --warn: #b91c1c;
  --warn-bg: #fee2e2;
  --warn-fg: #991b1b;

  /* ---------- TYPE FAMILIES ---------- */
  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;

  /* ---------- TYPE SCALE (px) ---------- */
  --fs-eyebrow: 11px;      /* uppercase tracked label */
  --fs-micro: 9px;         /* section labels */
  --fs-note: 10.5px;       /* italic notes */
  --fs-small: 11px;
  --fs-body: 13px;         /* line items */
  --fs-base: 14px;         /* default body */
  --fs-sub: 17px;          /* italic subheads */
  --fs-h3: 20px;
  --fs-h2: 22px;
  --fs-h1: 32px;
  --fs-display: 38px;      /* hero header */

  /* ---------- TRACKING ---------- */
  --track-eyebrow: 0.25em;
  --track-label: 0.15em;
  --track-tight: -0.02em;  /* display headings */

  /* ---------- SPACING (4px base rhythm) ---------- */
  --sp-1: 4px;
  --sp-2: 6px;
  --sp-3: 8px;
  --sp-4: 10px;
  --sp-5: 12px;
  --sp-6: 14px;
  --sp-7: 16px;
  --sp-8: 18px;
  --sp-9: 20px;
  --sp-10: 24px;
  --sp-12: 30px;
  --sp-14: 40px;

  /* ---------- RADII (mostly square — editorial) ---------- */
  --radius-chip: 3px;      /* tags, chips, pills */
  --radius-card: 4px;      /* cards, columns */
  --radius-0: 0px;         /* full-width ledger bands are square */

  /* ---------- BORDERS ---------- */
  --border-hair: 1px solid var(--rule);
  --border-dash: 1px dashed var(--rule);
  --border-strong: 2px solid var(--ink);
  --border-double: 3px double var(--ink);
  --border-accent: 4px solid var(--gold);

  /* ---------- SHADOWS (rare, soft) ---------- */
  --shadow-card: 0 4px 12px rgba(0,0,0,0.08);
}

/* ============================================================
   SEMANTIC TYPE CLASSES
   Use these directly, or copy the rule into your own selectors.
   ============================================================ */

.db-eyebrow {
  font-family: var(--font-body);
  font-size: var(--fs-eyebrow);
  text-transform: uppercase;
  letter-spacing: var(--track-eyebrow);
  font-weight: 600;
  color: var(--gold);
}

.db-display {
  font-family: var(--font-display);
  font-size: var(--fs-display);
  font-weight: 900;
  letter-spacing: var(--track-tight);
  line-height: 1.05;
  color: var(--ink);
}

.db-h1 {
  font-family: var(--font-display);
  font-size: var(--fs-h1);
  font-weight: 900;
  letter-spacing: var(--track-tight);
  line-height: 1.1;
  color: var(--ink);
}

.db-h2 {
  font-family: var(--font-display);
  font-size: var(--fs-h2);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.db-h3 {
  font-family: var(--font-display);
  font-size: var(--fs-h3);
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.db-subhead {
  font-family: var(--font-display);
  font-style: italic;
  font-size: var(--fs-sub);
  font-weight: 400;
  color: var(--fg-3);
}

.db-label {
  font-family: var(--font-body);
  font-size: var(--fs-micro);
  text-transform: uppercase;
  letter-spacing: var(--track-label);
  font-weight: 700;
}

.db-body {
  font-family: var(--font-body);
  font-size: var(--fs-base);
  font-weight: 400;
  line-height: 1.45;
  color: var(--fg-2);
}

.db-item {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  font-weight: 500;
  line-height: 1.3;
  color: var(--ink);
}

.db-note {
  font-family: var(--font-body);
  font-size: var(--fs-note);
  font-style: italic;
  color: var(--fg-4);
}

/* Figures — ALWAYS monospace. Amounts, balances, ledger numbers. */
.db-amount {
  font-family: var(--font-mono);
  font-size: var(--fs-base);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.db-amount-pos { color: var(--pos); }
.db-amount-neg { color: var(--ink); }

.db-figure-lg {
  font-family: var(--font-mono);
  font-size: var(--fs-h2);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

</style>
<style>
/* ============================================================
   Daybook app — UI kit stylesheet
   Component classes built on the foundational tokens.
   Faithful to the Daily Money Ledger reference artifact.
   ============================================================ */

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.45;
}

/* ---------- App frame ---------- */
.app-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(253,252,248,0.92);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 26px;
}
.app-mark {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.03em;
}
.app-mark .dot { color: var(--gold); }
.app-range {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 13px;
  color: var(--fg-3);
}
.app-spacer { flex: 1; }
.app-btn {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-3);
  background: none;
  border: 1px solid var(--rule);
  border-radius: 4px;
  padding: 7px 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
}
.app-btn:hover { background: var(--warm-1); color: var(--ink); }
.app-btn:active { background: var(--rule); }
.app-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.app-btn.primary:hover { opacity: 0.88; }

/* save indicator + storage warning */
.save-dot { font-family: var(--font-body); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-5); }
.save-dot.ok { color: var(--pos); }
.storage-warn { background: var(--warn-bg); color: var(--warn-fg); font-size: 12px; line-height: 1.5; padding: 10px 26px; border-bottom: 1px solid var(--rule); }
.storage-warn strong { color: var(--warn); }

/* day jump pills */
.day-nav {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 10px 26px;
  border-bottom: 1px solid var(--rule);
  background: var(--card);
  position: sticky;
  top: 53px;
  z-index: 19;
}
.day-pill {
  flex-shrink: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-4);
  background: none;
  border: 1px solid var(--rule);
  border-radius: 3px;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 140ms ease;
}
.day-pill:hover { background: var(--warm-1); color: var(--ink); }
.day-pill.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.day-pill.star { border-color: var(--gold); color: var(--gold); }
.day-pill.star.active { background: var(--gold); color: #fff; }

.page { max-width: 920px; margin: 0 auto; padding: 30px 20px 80px; }

/* ---------- Masthead ---------- */
.masthead { text-align: center; margin-bottom: 34px; padding-bottom: 26px; border-bottom: 2px solid var(--ink); }
.masthead .eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 12px; font-weight: 600; }
.masthead h1 { font-family: var(--font-display); font-size: 38px; font-weight: 900; letter-spacing: -0.02em; line-height: 1.05; margin-bottom: 10px; }
.masthead .sub { font-family: var(--font-display); font-style: italic; font-size: 17px; color: var(--fg-3); }
.masthead .version { margin-top: 8px; font-size: 11px; color: var(--fg-5); letter-spacing: 0.1em; text-transform: uppercase; }

/* ---------- Summary bar ---------- */
.summary { background: var(--ink); color: var(--paper); padding: 22px 26px; margin-bottom: 26px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
.summary-cell { text-align: center; }
.summary-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; opacity: 0.7; margin-bottom: 6px; }
.summary-value { font-family: var(--font-display); font-size: 22px; font-weight: 700; }
.summary-value.gold { color: var(--gold); }

/* ---------- Callout / instructions ---------- */
.callout { background: var(--card); border: 1px solid var(--rule); padding: 20px 24px; margin-bottom: 22px; border-left: 4px solid var(--gold); font-size: 13px; }
.callout h3 { font-family: var(--font-display); font-size: 17px; margin-bottom: 8px; }
.callout ul { margin-left: 20px; color: var(--fg-2); }
.callout li { margin-bottom: 4px; }
.callout strong { color: var(--ink); }
.tip-callout { background: var(--auto-bg); color: var(--auto); border-left: 4px solid var(--auto-accent); padding: 13px 18px; font-size: 12.5px; margin-bottom: 22px; }
.tip-callout strong { color: #2a2080; }

/* ---------- Payment reference card ---------- */
.payment-card { background: var(--card); border: 2px solid var(--ink); padding: 22px 26px; margin-bottom: 26px; }
.payment-card h3 { font-family: var(--font-display); font-size: 20px; text-align: center; margin-bottom: 16px; }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.card-col { border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }
.card-header { padding: 12px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; text-align: center; border-bottom: 1px solid var(--rule); }
.card-header.biz { background: var(--biz-tint); color: var(--biz); }
.card-header.personal { background: var(--person-tint); color: var(--person); }
.bill-list { list-style: none; }
.bill-list li { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-bottom: 1px dashed var(--rule); font-size: 13px; gap: 10px; }
.bill-list li:last-child { border-bottom: none; }
.bill-amt { font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--fg-3); white-space: nowrap; }
.bill-list li.transfer-out { background: var(--warm-1); font-style: italic; color: var(--fg-3); }
.bill-list li.paused { opacity: 0.5; text-decoration: line-through; }

/* ---------- Day block ---------- */
.day { background: var(--card); border: 1px solid var(--rule); margin-bottom: 18px; scroll-margin-top: 110px; }
.day.star { border: 2px solid var(--ink); box-shadow: var(--shadow-card); }
.day-header { padding: 14px 20px 12px; background: var(--warm-1); border-bottom: 1px solid var(--rule); }
.day-header h2 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
.day-header .badge { color: var(--gold); font-size: 13px; font-weight: 600; }

.section { border-bottom: 1px solid var(--rule); }
.section:last-of-type { border-bottom: none; }
.section-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; font-weight: 700; padding: 8px 20px 6px; }
.section-label.deposits { color: var(--pos); background: var(--pos-tint); }
.section-label.clearing { color: var(--pos); background: var(--pos-tint); }
.section-label.biz { color: var(--biz); background: var(--biz-tint); }
.section-label.personal { color: var(--person); background: var(--person-tint); }

/* line rows */
.line-row { display: grid; grid-template-columns: 22px 24px 1fr auto auto; gap: 10px; align-items: center; padding: 9px 20px; border-bottom: 1px dashed var(--rule); transition: background 120ms ease; }
.line-row:last-child { border-bottom: none; }
.line-row.clickable { cursor: pointer; }
.line-row.clickable:hover { background: rgba(0,0,0,0.02); }
.line-row.info-row { grid-template-columns: 1fr auto; }
.line-row.done .line-item, .line-row.done .line-amount { text-decoration: line-through; opacity: 0.5; }
.line-number { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--fg-5); text-align: center; user-select: none; }
.check-box { width: 17px; height: 17px; border: 1.5px solid var(--rule); border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--pos); margin: 0 auto; transition: border-color 120ms ease, background 120ms ease; }
.line-row.done .check-box { border-color: var(--pos); background: var(--pos-chip-bg); }
.line-content { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.line-tag { align-self: flex-start; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 3px; font-weight: 600; }
.line-tag.dep { background: var(--pos-chip-bg); color: var(--pos); }
.line-tag.pending { background: var(--pending-bg); color: var(--pending); }
.line-tag.biz { background: var(--biz-tint); color: var(--biz); }
.line-tag.personal { background: var(--person-tint); color: var(--person); }
.line-tag.irs { background: var(--ink); color: var(--fg-on-ink); }
.line-tag.ministry { background: var(--special-bg); color: var(--special); }
.line-tag.funds { background: var(--pos-chip-bg); color: var(--pos); }
.line-item { font-size: 13px; font-weight: 500; line-height: 1.3; }
.line-note { font-size: 10.5px; color: var(--fg-4); font-style: italic; }
.auto-tag { background: var(--auto-bg); color: var(--auto); font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-left: 6px; letter-spacing: 0.05em; white-space: nowrap; }
.line-amount { font-family: var(--font-mono); font-size: 14px; font-weight: 600; white-space: nowrap; }
.line-amount.positive { color: var(--pos); }
.line-amount.negative { color: var(--ink); }
.line-amount.pending { color: var(--pending); opacity: 0.75; }
.balance-after { font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 3px; white-space: nowrap; text-align: right; }
.balance-after.biz { background: var(--biz-tint); color: var(--biz); }
.balance-after.personal { background: var(--person-tint); color: var(--person); }
.balance-after.pending { background: var(--pending-bg); color: var(--pending); }

/* transfer row */
.transfer-row { background: var(--ink); color: var(--paper); padding: 11px 20px; display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 600; }
.transfer-arrow { font-size: 16px; }
.transfer-amount { font-family: var(--font-mono); font-size: 14px; }
.transfer-pair { margin-left: auto; display: flex; gap: 6px; }
.transfer-pair span { font-family: var(--font-mono); font-size: 10.5px; font-weight: 600; padding: 3px 8px; border-radius: 3px; }
.transfer-pair .biz { background: var(--biz-tint); color: var(--biz); }
.transfer-pair .personal { background: var(--person-tint); color: var(--person); }

/* day bands */
.band { padding: 9px 20px; display: flex; align-items: center; gap: 10px; font-size: 12px; flex-wrap: wrap; }
.band.sod { background: var(--info-tint); border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); }
.band.eod { background: var(--warm-2); border-top: 1px solid var(--rule); }
.band-label { font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; font-size: 9px; }
.band.sod .band-label { color: var(--info); }
.band.eod .band-label { color: var(--fg-3); }
.band-fig { font-family: var(--font-mono); font-weight: 700; font-size: 12px; }
.band-fig.biz { color: var(--biz); }
.band-fig.personal { color: var(--person); }
.band-fig.pending { color: var(--pending); }
.band-fig.pot { color: var(--pot); background: var(--pot-bg); padding: 2px 8px; border-radius: 3px; }
.band-fig.irs { color: var(--fg-on-ink); background: var(--ink); padding: 2px 8px; border-radius: 3px; }
.band-div { color: var(--fg-6); }

.day-note { background: var(--warm-1); padding: 10px 20px; font-size: 11.5px; font-style: italic; color: var(--fg-3); border-top: 1px dashed var(--rule); }

/* totals */
.totals { margin-top: 36px; padding: 26px; background: var(--card); border: 2px solid var(--ink); }
.totals h3 { font-family: var(--font-display); font-size: 22px; margin-bottom: 16px; text-align: center; }
.totals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 28px; }
.totals-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px dotted var(--rule); font-size: 13px; }
.totals-row strong { font-family: var(--font-mono); font-size: 14px; }
.totals-row.grand { grid-column: 1 / -1; border-top: 2px solid var(--ink); border-bottom: none; padding-top: 14px; margin-top: 8px; }
.totals-row.grand strong { color: var(--gold); }

@media (max-width: 640px) { .card-grid { grid-template-columns: 1fr; } .summary { grid-template-columns: repeat(2, 1fr); } }

/* ============================================================
   EDITABLE CONTROLS
   ============================================================ */

/* inline editable text — looks like text until hover/focus */
.inline-input {
  font: inherit;
  color: inherit;
  letter-spacing: inherit;
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  padding: 1px 2px;
  margin: -1px -2px;
  border-radius: 2px;
  outline: none;
  width: 100%;
  min-width: 20px;
  transition: background 120ms ease, border-color 120ms ease;
}
.inline-input:hover { background: rgba(184,137,58,0.08); }
.inline-input:focus { background: #fff; border-bottom-color: var(--gold); box-shadow: 0 1px 0 var(--gold); }
.inline-input::placeholder { color: var(--fg-6); font-style: italic; }

/* money input sits in the amount cell */
.money-cell { display: flex; align-items: center; justify-content: flex-end; gap: 1px; font-family: var(--font-mono); font-size: 14px; font-weight: 600; white-space: nowrap; }
.money-sign { user-select: none; }
.money-cell.positive, .money-cell.positive .money-input { color: var(--pos); }
.money-cell.negative, .money-cell.negative .money-input { color: var(--ink); }
.money-cell.pending, .money-cell.pending .money-input { color: var(--pending); }
.money-input {
  font: inherit; color: inherit; background: transparent; border: none;
  border-bottom: 1px solid transparent; outline: none; text-align: right;
  width: 7ch; padding: 1px 2px; border-radius: 2px;
  transition: background 120ms ease, border-color 120ms ease;
}

/* ============================================================
   Daybook — data model, compute engine, formatters
   Exposed on window.DAYBOOK for the other babel scripts.
   ============================================================ */

let __uid = 100;
function uid() { return 'id' + (++__uid) + '_' + Math.random().toString(36).slice(2, 6); }

/* ---- money formatting ---- */
function fmtMoney(n) {
  const neg = n < -0.0049;
  const v = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (neg ? '−$' : '$') + v;
}
function fmtSigned(n) {
  const v = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (n < 0 ? '−$' : '+$') + v;
}

/* ---- line type metadata ---- */
const TYPE_META = {
  credit:   { label: '+ Deposit',         tagClass: 'dep',      sign: +1, amtClass: 'positive', acct: true,  group: 'in'  },
  pending:  { label: '⏳ Pending',         tagClass: 'pending',  sign: +1, amtClass: 'pending',  acct: true,  group: 'in'  },
  clear:    { label: '+ Funds available',  tagClass: 'funds',    sign: +1, amtClass: 'positive', acct: true,  group: 'in'  },
  debit:    { label: 'Bill',               tagClass: 'biz',      sign: -1, amtClass: 'negative', acct: true,  group: 'out' },
  savings:  { label: '💰 To savings',      tagClass: 'pending',  sign: -1, amtClass: 'pending',  acct: true,  group: 'move'},
  transfer: { label: 'Transfer',           tagClass: '',         sign: -1, amtClass: 'negative', acct: false, group: 'move'},
};

const TYPE_OPTIONS = [
  { value: 'credit',  text: 'Deposit' },
  { value: 'pending', text: 'Pending' },
  { value: 'clear',   text: 'Cleared' },
  { value: 'debit',   text: 'Bill' },
  { value: 'transfer',text: 'Transfer' },
  { value: 'savings', text: 'To savings' },
];

/* resolve the displayed tag for a line */
function lineTag(line) {
  if (line.customTag) return { text: line.customTag, cls: line.customTagClass || 'biz' };
  const m = TYPE_META[line.type];
  if (line.type === 'debit') {
    return { text: line.account === 'personal' ? 'Personal bill' : 'Business bill', cls: line.account === 'personal' ? 'personal' : 'biz' };
  }
  return { text: m.label, cls: m.tagClass };
}

/* ---- compute running balances across all days ---- */
function isIRS(line) {
  if (line.customTag && /irs/i.test(line.customTag)) return true;
  return /\birs\b/i.test(line.desc || '');
}

/* Stripe processing fee: 2.9% + $0.30 per transaction */
const STRIPE_RATE = 0.029;
const STRIPE_FLAT = 0.30;
function stripeFee(gross) {
  const g = num(gross);
  if (g <= 0) return 0;
  return Math.round((g * STRIPE_RATE + STRIPE_FLAT) * 100) / 100;
}
function netAfterStripe(gross) {
  return Math.round((num(gross) - stripeFee(gross)) * 100) / 100;
}
/* effective credited amount for a deposit-type line */
function effAmount(line) {
  const amt = num(line.amount);
  return line.stripe ? netAfterStripe(amt) : amt;
}

function computeLedger(ledger) {
  let biz = num(ledger.opening.biz);
  let personal = num(ledger.opening.personal);
  let savings = num(ledger.opening.savings);
  let pending = num(ledger.opening.pending || 0);
  let irs = num(ledger.opening.irs || 0);

  let totalIn = 0, totalOut = 0;

  function applyTo(acct, delta) { if (acct === 'personal') personal += delta; else biz += delta; }

  const days = ledger.days.map(day => {
    const sod = { biz, personal, savings, pending, irs };
    const rows = day.lines.map(line => {
      const amt = num(line.amount);
      const net = (line.stripe && (line.type === 'credit' || line.type === 'clear' || line.type === 'pending'))
        ? netAfterStripe(amt) : amt;
      const acct = line.account || (line.type === 'savings' ? 'personal' : 'biz');
      if (line.type === 'credit')        { applyTo(acct, +net); totalIn += net; }
      else if (line.type === 'clear')    { pending -= amt; applyTo(acct, +net); totalIn += net; }
      else if (line.type === 'pending')  { pending += net; }
      else if (line.type === 'debit')    { applyTo(acct, -amt); totalOut += amt; if (isIRS(line)) irs += amt; }
      else if (line.type === 'transfer') { biz -= amt; personal += amt; }
      else if (line.type === 'savings')  { applyTo(acct, -amt); savings += amt; }
      return { ...line, _bal: { biz, personal, pending, acct }, _fee: line.stripe ? stripeFee(amt) : 0, _net: net };
    });
    const eod = { biz, personal, savings, pending, irs };
    return { ...day, _sod: sod, _eod: eod, _rows: rows };
  });

  return {
    days,
    summary: {
      moneyIn: totalIn,
      moneyOut: totalOut,
      net: totalIn - totalOut,
      endBiz: biz,
      endPersonal: personal,
      endSavings: savings,
      endPending: pending,
      irsPaid: irs,
      cushion: biz + personal,
    }
  };
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

<script type="text/babel">
/* ============================================================
   Daybook — editable atom components
   ============================================================ */
const { useState, useRef, useEffect, useCallback } = React;

/* text that reads as text but edits in place */
function InlineInput({ value, onChange, placeholder, className = '', style, onKeyDown }) {
  return (
    <input
      className={'inline-input ' + className}
      style={style}
      value={value == null ? '' : value}
      placeholder={placeholder}
      onChange={(e) => onChange(e.target.value)}
      onKeyDown={onKeyDown}
    />
  );
}

/* a growing textarea for day notes */
function AutoTextarea({ value, onChange, placeholder, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
  }, [value]);
  return (
    <textarea
      ref={ref}
      rows={1}
      className={'inline-input ' + className}
      value={value == null ? '' : value}
      placeholder={placeholder}
      onChange={(e) => onChange(e.target.value)}
    />
  );
}

/* editable money figure with a colored sign */
function MoneyInput({ value, onChange, sign, amtClass }) {
  return (
    <span className={'money-cell ' + amtClass}>
      <span className="money-sign">{sign > 0 ? '+' : '−'}$</span>
      <input
        className="money-input"
        type="number"
        step="0.01"
        min="0"
        value={value}
        onChange={(e) => onChange(e.target.value)}
        onFocus={(e) => e.target.select()}
      />
    </span>
  );
}

/* read-only computed running balance chip */
function BalanceChip({ acct, value }) {
  const { fmtMoney } = window.DAYBOOK;
  const cls = acct === 'personal' ? 'personal' : 'biz';
  const label = acct === 'personal' ? 'Pers' : 'Biz';
  return <span className={'balance-after ' + cls}>{label}: {fmtMoney(value)}</span>;
}

/* small icon button */
function IconBtn({ onClick, title, className = '', children }) {
  return (
    <button className={'icon-btn ' + className} title={title} onClick={onClick} type="button">
      {children}
    </button>
  );
}

Object.assign(window, { InlineInput, AutoTextarea, MoneyInput, BalanceChip, IconBtn });

</script>
<script type="text/babel">
/* ============================================================
   Daybook — editable DayBlock + LineRow
   Renders one computed day with full inline editing.
   ============================================================ */

const SECTION_LABEL = {
  in:       { text: 'Deposits & Incoming', cls: 'deposits' },
  biz:      { text: 'Business Account',    cls: 'biz' },
  personal: { text: 'Personal Account',    cls: 'personal' },
  move:     { text: 'Savings',             cls: 'deposits' },
};

function sectionOf(line) {
  if (line.type === 'transfer') return 'transfer';
  if (line.type === 'savings') return 'move';
  if (line.type === 'debit') return line.account === 'personal' ? 'personal' : 'biz';
  return 'in';
}

/* ---- one editable line ---- */
function LineRow({ line, onPatch, onDelete }) {
  const { TYPE_META, TYPE_OPTIONS, lineTag } = window.DAYBOOK;
  const meta = TYPE_META[line.type] || TYPE_META.debit;
  const tag = lineTag(line);

  const typeSelect = (
    <select className="type-select" value={line.type}
      onChange={(e) => onPatch({ type: e.target.value, customTag: undefined, customTagClass: undefined })}>
      {TYPE_OPTIONS.map(o => <option key={o.value} value={o.value}>{o.text}</option>)}
    </select>
  );

  /* ---- transfer renders as a full-width dark bar ---- */
  if (line.type === 'transfer') {
    return (
      <div className="transfer-row">
        <span className="transfer-arrow">→</span>
        <window.InlineInput value={line.desc} placeholder="Transfer…"
          onChange={(v) => onPatch({ desc: v })} style={{ maxWidth: '320px' }} />
        <window.MoneyInput value={line.amount} sign={-1} amtClass=""
          onChange={(v) => onPatch({ amount: v })} />
        <span className="transfer-pair">
          <span className="biz">Biz {window.DAYBOOK.fmtMoney(line._bal.biz)}</span>
          <span className="personal">Pers {window.DAYBOOK.fmtMoney(line._bal.personal)}</span>
        </span>
        <div className="row-actions">
          {typeSelect}
          <window.IconBtn title="Delete" onClick={onDelete}>×</window.IconBtn>
        </div>
      </div>
    );
  }

  /* effective account (savings defaults to personal, others to business) */
  const effAcct = line.account || (line.type === 'savings' ? 'personal' : 'biz');

  /* ---- balance chip ---- */
  let balance;
  if (line.type === 'pending') {
    balance = <span className="balance-after pending">Pending: {window.DAYBOOK.fmtMoney(line._bal.pending)}</span>;
  } else {
    balance = <window.BalanceChip acct={effAcct} value={line._bal[effAcct]} />;
  }

  const showAcct = meta.acct;

  return (
    <div className={'line-row edit' + (line.done ? ' done' : '')}>
      <div className="check-box" onClick={() => onPatch({ done: !line.done })} title="Mark done">
        {line.done ? '✓' : ''}
      </div>
      <div className="line-content">
        <div className="line-controls" style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
          {line.customTag
            ? <span className={'line-tag ' + (line.customTagClass || 'biz')}>{line.customTag}</span>
            : <span className={'line-tag ' + tag.cls} style={{ alignSelf: 'auto' }}>{tag.text}</span>}
          {typeSelect}
          {showAcct && (
            <button className={'acct-toggle ' + effAcct}
              onClick={() => onPatch({ account: effAcct === 'personal' ? 'biz' : 'personal' })} type="button">
              {effAcct === 'personal' ? 'Personal' : 'Business'}
            </button>
          )}

/* ---- the day block ---- */
function DayBlock({ day, onPatchDay, onDeleteDay, onPatchLine, onDeleteLine, onAddLine }) {
  // build render items, inserting section labels on bucket change
  const items = [];
  let prev = null;
  day._rows.forEach((line) => {
    const sec = sectionOf(line);
    if (sec === 'transfer') {
      prev = null;
      items.push(<LineRow key={line.id} line={line}
        onPatch={(p) => onPatchLine(day.id, line.id, p)} onDelete={() => onDeleteLine(day.id, line.id)} />);
      return;
    }
    if (sec !== prev) {
      const lbl = SECTION_LABEL[sec];
      items.push(<div key={'lbl-' + line.id} className={'section-label ' + lbl.cls}>{lbl.text}</div>);
      prev = sec;
    }
    items.push(<LineRow key={line.id} line={line}
      onPatch={(p) => onPatchLine(day.id, line.id, p)} onDelete={() => onDeleteLine(day.id, line.id)} />);
  });

  return (
    <div className={'day' + (day.star ? ' star' : '')} id={'day-' + day.id}>
      <div className="day-header">
        <button className={'star-toggle' + (day.star ? ' on' : '')} title="Mark important"

        <h2>
          <window.InlineInput value={day.date} placeholder="Day…"
            onChange={(v) => onPatchDay(day.id, { date: v })} />
        </h2>
        {day.badge && (
          <span className="badge">
            <window.InlineInput value={day.badge} onChange={(v) => onPatchDay(day.id, { badge: v })}
              style={{ color: 'var(--gold)', width: '160px' }} />
          </span>
        )}
        <window.IconBtn className="day-delete" title="Delete day" onClick={() => onDeleteDay(day.id)}>🗑</window.IconBtn>
      </div>

      <Band kind="sod" bal={day._sod} />

      {items.length ? items : <div className="section-empty">No entries yet — add one below.</div>}

      <div className="add-row">
        <button className="add-line" onClick={() => onAddLine(day.id, 'debit')} type="button">
          <span className="plus">+</span> Add bill payment
        </button>
        <button className="add-line" onClick={() => onAddLine(day.id, 'pending')} type="button">
          <span className="plus">+</span> Add pending payment
        </button>
        <button className="add-line" onClick={() => onAddLine(day.id, 'credit')} type="button">
          <span className="plus">+</span> Add deposit
        </button>
        <button className="add-line" onClick={() => onAddLine(day.id, 'transfer')} type="button">
          <span className="plus">+</span> Add transfer
        </button>
      </div>

      <Band kind="eod" bal={day._eod} />

      <div className="day-note">
        <window.AutoTextarea value={day.note} placeholder="A note for the day…"
          className="day-note-edit" onChange={(v) => onPatchDay(day.id, { note: v })} />
      </div>
    </div>
  );
}

Object.assign(window, { DayBlock, LineRow });

<script type="text/babel">
/* ============================================================
   Daybook — Fuel Log
   Records each fill-up (date, odometer, gallons) and AUTO-computes
   miles driven + MPG. No math for the user.

   MPG for a fill-up = (this odometer − previous odometer) ÷ gallons
   Rolling average = total miles ÷ total gallons (across logged fills)
   ============================================================ */

function FuelLog({ fuel, onPatch, onAdd, onDelete }) {
  const { num } = window.DAYBOOK;

  // compute miles + mpg per row (relative to the row above it)
  const rows = fuel.map((f, i) => {
    const odo = num(f.odometer);
    const gal = num(f.gallons);
    let miles = null, mpg = null;
    if (i > 0) {
      const prevOdo = num(fuel[i - 1].odometer);
      miles = odo - prevOdo;
      if (gal > 0 && miles >= 0) mpg = miles / gal;
    }
    return { ...f, _miles: miles, _mpg: mpg };
  });

  // current odometer = the highest/last logged reading
  const current = fuel.length ? num(fuel[fuel.length - 1].odometer) : 0;

  // rolling average over rows that have a valid mpg
  let totMiles = 0, totGal = 0;
  rows.forEach(r => { if (r._mpg != null) { totMiles += r._miles; totGal += num(r.gallons); } });
  const avgMpg = totGal > 0 ? (totMiles / totGal) : null;

  // simple trend flag: is the most recent mpg notably below the average?
  const lastMpg = [...rows].reverse().find(r => r._mpg != null);
  const lowFlag = (avgMpg != null && lastMpg && lastMpg._mpg < avgMpg * 0.88);

  const fmtMpg = (v) => v == null ? '—' : v.toFixed(1);
  const fmtOdo = (v) => num(v).toLocaleString('en-US');

  return (
    <div className="chart-card">
      <div className="chart-header fuel">⛽ Fuel Log — MPG calculated for you</div>
      <div className="chart-body">
        <div className="odo-display">
          <span className="odo-label">Current odometer</span>
          <span className="odo-value">{fmtOdo(current)} mi</span>
          <span className="odo-label" style={{ marginLeft: 'auto' }}>Avg MPG</span>
          <span className={'mpg-badge' + (lowFlag ? ' low' : '')}>{fmtMpg(avgMpg)}</span>
        </div>

        {lowFlag && (
          <div className="fuel-warn">
            ⚠ Last tank ({fmtMpg(lastMpg._mpg)} MPG) is below your average ({fmtMpg(avgMpg)}). Worth a check — tire pressure, air filter, or brakes.
          </div>
        )}

        <div className="fuel-row fuel-head">
          <span>Date</span>
          <span>Odometer</span>
          <span>Gallons</span>
          <span>Miles</span>
          <span>MPG</span>
          <span></span>
        </div>

        {rows.map((r, i) => (
          <div className="fuel-row" key={r.id}>
            <label className="fuel-cell">
              <span className="fuel-lbl">Date</span>
              <window.InlineInput className="fuel-date" value={r.date} placeholder="date"
                onChange={(v) => onPatch(r.id, { date: v })} />
            </label>
            <label className="fuel-cell">
              <span className="fuel-lbl">Odometer</span>
              <input type="number" className="fuel-input" value={r.odometer}
                onChange={(e) => onPatch(r.id, { odometer: e.target.value })} />
            </label>
            <label className="fuel-cell">
              <span className="fuel-lbl">Gallons</span>
              <input type="number" step="0.01" className="fuel-input" value={r.gallons}
                onChange={(e) => onPatch(r.id, { gallons: e.target.value })} />
            </label>
            <div className="fuel-cell">
              <span className="fuel-lbl">Miles</span>
              <span className="fuel-calc">{r._miles == null ? '—' : fmtOdo(r._miles)}</span>
            </div>
            <div className="fuel-cell">
              <span className="fuel-lbl">MPG</span>
              <span className={'fuel-mpg' + (r._mpg != null && avgMpg != null && r._mpg < avgMpg * 0.88 ? ' low' : '')}>
                {fmtMpg(r._mpg)}
              </span>
            </div>
            <window.IconBtn className="fuel-del" title="Delete fill-up" onClick={() => onDelete(r.id)}>×</window.IconBtn>
          </div>
        ))}

        <button className="add-line" onClick={onAdd} type="button">
          <span className="plus">+</span> Add fill-up
        </button>

        <div className="fuel-note">
          Enter the <strong>odometer</strong> and <strong>gallons</strong> at each fill-up — MPG and miles driven are calculated automatically from the previous reading. The first row is just your starting odometer (no MPG yet).
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { FuelLog });

</script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { computeLedger, fmtMoney, uid, SEED } = window.DAYBOOK;
const STORAGE_KEY = 'daybook_ledger_v6';

// probe whether localStorage actually persists in this context
function storageWorks() {
  try {
    const k = '__db_probe__';
    localStorage.setItem(k, '1');
    const ok = localStorage.getItem(k) === '1';
    localStorage.removeItem(k);
    return ok;
  } catch (e) { return false; }
}
const STORAGE_OK = storageWorks();

function loadLedger() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // backfill new sections if loading an older save
      const seed = JSON.parse(JSON.stringify(SEED));
      if (!parsed.reference) parsed.reference = seed.reference;
      if (!parsed.maintenance) parsed.maintenance = seed.maintenance;
      if (!parsed.upcoming) parsed.upcoming = seed.upcoming;
      if (!parsed.fuel) parsed.fuel = seed.fuel;
      if (parsed.opening && parsed.opening.irs == null) parsed.opening.irs = 0;
      return parsed;
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(SEED));
}

function pillLabel(date) {
  const parts = (date || '').split(', ');
  if (parts.length === 2) return parts[0].slice(0, 3) + ' · ' + parts[1];
  return (date || 'Day').slice(0, 12);
}

function App() {
  const [ledger, setLedger] = useState(loadLedger);
  const [toast, setToast] = useState('');
  const [saved, setSaved] = useState(true);
  const toastTimer = useRef(null);
  const firstRun = useRef(true);

  // autosave
  useEffect(() => {
    if (firstRun.current) { firstRun.current = false; return; }
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ledger));
      setSaved(true);
    } catch (e) { setSaved(false); }
  }, [ledger]);

  const flash = (msg) => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 1600);
  };

  const importJSON = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'application/json,.json';
    inp.onchange = () => {
      const file = inp.files && inp.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data.days || !data.opening) throw new Error('not a Daybook file');
          const seed = JSON.parse(JSON.stringify(SEED));
          if (!data.reference) data.reference = seed.reference;
          if (!data.maintenance) data.maintenance = seed.maintenance;
          if (!data.upcoming) data.upcoming = seed.upcoming;
          setLedger(data);
          flash('Imported ✓');
        } catch (err) { flash('Could not read that file'); }
      };
      reader.readAsText(file);
    };
    inp.click();
  };

  const computed = computeLedger(ledger);

  // ---- mutators ----
  const patchMeta = (patch) => setLedger(l => ({ ...l, ...patch }));
  const patchOpening = (patch) => setLedger(l => ({ ...l, opening: { ...l.opening, ...patch } }));

  const patchDay = (dayId, patch) => setLedger(l => ({
    ...l, days: l.days.map(d => d.id === dayId ? { ...d, ...patch } : d)
  }));
  const deleteDay = (dayId) => {
    if (!window.confirm('Delete this whole day?')) return;
    setLedger(l => ({ ...l, days: l.days.filter(d => d.id !== dayId) }));
    flash('Day deleted');
  };
  const patchLine = (dayId, lineId, patch) => setLedger(l => ({
    ...l, days: l.days.map(d => d.id !== dayId ? d : {
      ...d, lines: d.lines.map(ln => ln.id === lineId ? { ...ln, ...patch } : ln)
    })
  }));
  const deleteLine = (dayId, lineId) => setLedger(l => ({
    ...l, days: l.days.map(d => d.id !== dayId ? d : { ...d, lines: d.lines.filter(ln => ln.id !== lineId) })
  }));
  const DEFAULT_LINE = {
    debit:    { type: 'debit', account: 'biz', desc: '', note: '', amount: 0, done: false },
    pending:  { type: 'pending', account: 'biz', desc: '', note: 'Payment pending', amount: 0, done: false },
    credit:   { type: 'credit', account: 'biz', desc: '', note: '', amount: 0, done: false },
    transfer: { type: 'transfer', desc: 'Transfer Business → Personal', note: '', amount: 0, done: false },
  };
  const addLine = (dayId, kind = 'debit') => setLedger(l => ({
    ...l, days: l.days.map(d => d.id !== dayId ? d : {
      ...d, lines: [...d.lines, { ...(DEFAULT_LINE[kind] || DEFAULT_LINE.debit), id: uid() }]
    })
  }));

  // ---- reference / maintenance / upcoming mutators ----
  const patchBill = (side, billId, patch) => setLedger(l => ({
    ...l, reference: { ...l.reference, [side]: l.reference[side].map(b => b.id === billId ? { ...b, ...patch } : b) }
  }));
  const addBill = (side) => setLedger(l => ({
    ...l, reference: { ...l.reference, [side]: [...l.reference[side], { id: uid(), name: '', due: '', cost: 0, auto: false, paused: false }] }
  }));
  const deleteBill = (side, billId) => setLedger(l => ({
    ...l, reference: { ...l.reference, [side]: l.reference[side].filter(b => b.id !== billId) }
  }));

  const patchMaint = (patch) => setLedger(l => ({ ...l, maintenance: { ...l.maintenance, ...patch } }));
  const patchMaintItem = (itemId, patch) => setLedger(l => ({
    ...l, maintenance: { ...l.maintenance, items: l.maintenance.items.map(m => m.id === itemId ? { ...m, ...patch } : m) }
  }));
  const addMaintItem = () => setLedger(l => ({
    ...l, maintenance: { ...l.maintenance, items: [...l.maintenance.items, { id: uid(), item: '', due: '', done: false }] }
  }));
  const deleteMaintItem = (itemId) => setLedger(l => ({
    ...l, maintenance: { ...l.maintenance, items: l.maintenance.items.filter(m => m.id !== itemId) }
  }));

  const patchUpcoming = (itemId, patch) => setLedger(l => ({
    ...l, upcoming: l.upcoming.map(u => u.id === itemId ? { ...u, ...patch } : u)
  }));
  const addUpcoming = () => setLedger(l => ({ ...l, upcoming: [...l.upcoming, { id: uid(), item: '', cost: 0, due: '', done: false }] }));
  const deleteUpcoming = (itemId) => setLedger(l => ({ ...l, upcoming: l.upcoming.filter(u => u.id !== itemId) }));

  // ---- fuel log mutators ----
  const patchFuel = (fid, patch) => setLedger(l => ({
    ...l, fuel: (l.fuel || []).map(f => f.id === fid ? { ...f, ...patch } : f)
  }));
  const addFuel = () => setLedger(l => {
    const list = l.fuel || [];
    const lastOdo = list.length ? list[list.length - 1].odometer : 0;
    return { ...l, fuel: [...list, { id: uid(), date: '', odometer: lastOdo || 0, gallons: 0 }] };
  });
  const deleteFuel = (fid) => setLedger(l => ({ ...l, fuel: (l.fuel || []).filter(f => f.id !== fid) }));
  const addDay = () => {
    const id = uid();
    setLedger(l => ({ ...l, days: [...l.days, { id, date: 'New day', star: false, note: '', lines: [] }] }));
    flash('Day added');
    setTimeout(() => scrollToDay(id), 60);
  };

  const resetAll = () => {
    if (!window.confirm('Reset everything back to the sample ledger? Your edits will be lost.')) return;
    setLedger(JSON.parse(JSON.stringify(SEED)));
    flash('Reset to sample');
  };
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(ledger, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'daybook-ledger.json';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    flash('Exported JSON');
  };

  const scrollToDay = (id) => {
    const el = document.getElementById('day-' + id);
    if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 112, behavior: 'smooth' });
  };

  const ctr = { textAlign: 'center' };

  return (
    <React.Fragment>
      <div className="app-bar">
        <span className="app-mark">Daybook<span className="dot">.</span></span>
        <span className="app-range">{ledger.range}</span>
        <span className={'save-dot' + (saved ? ' ok' : '')} title={saved ? 'Saved in this browser' : 'Not saved — use Export'}>
          {STORAGE_OK ? (saved ? '● Saved' : '○ Saving…') : '○ Not saved'}
        </span>
        <span className="app-spacer"></span>
        <button className="app-btn" onClick={importJSON}>Import</button>
        <button className="app-btn" onClick={exportJSON}>Export</button>
        <button className="app-btn" onClick={resetAll}>Reset</button>
        <button className="app-btn primary" onClick={addDay}>+ Add day</button>
      </div>

      {!STORAGE_OK && (
        <div className="storage-warn">
          ⚠ This browser isn't letting Daybook save automatically (common when opening a file directly, especially in Safari). Your edits stay while this tab is open — use <strong>Export</strong> to save a copy to your computer, and <strong>Import</strong> to load it back later.
        </div>
      )}

      <div className="day-nav">
        {computed.days.map(d => (
          <button key={d.id} className={'day-pill' + (d.star ? ' star' : '')} onClick={() => scrollToDay(d.id)}>
            {pillLabel(d.date)}
          </button>
        ))}
      </div>

      <div className="page">
        {/* masthead */}
        <div className="masthead">
          <div className="eyebrow">
            <window.InlineInput value={ledger.eyebrow} style={ctr} onChange={v => patchMeta({ eyebrow: v })} />
          </div>
          <h1><window.InlineInput value={ledger.title} style={ctr} onChange={v => patchMeta({ title: v })} /></h1>
          <div className="sub"><window.InlineInput value={ledger.range} style={ctr} onChange={v => patchMeta({ range: v })} /></div>
          <div className="version"><window.InlineInput value={ledger.version} style={ctr} onChange={v => patchMeta({ version: v })} /></div>
        </div>

        {/* computed summary */}
        <div className="summary">
          <div className="summary-cell"><div className="summary-label">Money in</div><div className="summary-value">{fmtMoney(computed.summary.moneyIn)}</div></div>
          <div className="summary-cell"><div className="summary-label">Money out</div><div className="summary-value">{fmtMoney(computed.summary.moneyOut)}</div></div>
          <div className="summary-cell"><div className="summary-label">Net change</div><div className="summary-value">{fmtMoney(computed.summary.net)}</div></div>
          <div className="summary-cell"><div className="summary-label">End cushion</div><div className="summary-value gold">{fmtMoney(computed.summary.cushion)}</div></div>
        </div>

        {/* opening balances */}
        <div className="setup-card">
          <span className="setup-label">Opening position</span>
          <div className="setup-field"><label>Business</label><span className="setup-money biz">$<input type="number" step="0.01" value={ledger.opening.biz} onChange={e => patchOpening({ biz: e.target.value })} /></span></div>
          <div className="setup-field"><label>Personal</label><span className="setup-money personal">$<input type="number" step="0.01" value={ledger.opening.personal} onChange={e => patchOpening({ personal: e.target.value })} /></span></div>
          <div className="setup-field"><label>Pending</label><span className="setup-money pending">$<input type="number" step="0.01" value={ledger.opening.pending || 0} onChange={e => patchOpening({ pending: e.target.value })} /></span></div>
          <div className="setup-field"><label>Savings</label><span className="setup-money pot">$<input type="number" step="0.01" value={ledger.opening.savings} onChange={e => patchOpening({ savings: e.target.value })} /></span></div>
          <div className="setup-field"><label>IRS paid so far</label><span className="setup-money irs">$<input type="number" step="0.01" value={ledger.opening.irs || 0} onChange={e => patchOpening({ irs: e.target.value })} /></span></div>
        </div>

        {/* the system callout */}
        <div className="tip-callout">
          💡 <strong>How it works:</strong> Every line affects a running balance. <strong>Deposit</strong>/<strong>Cleared</strong> add money, <strong>Bill</strong> subtracts, <strong>Pending</strong> waits in its own pool, <strong>Transfer</strong> moves Business → Personal, <strong>To&nbsp;savings</strong> sets money aside. Edit any field — balances and the summary recompute instantly, and everything saves in your browser.
        </div>

        {/* reference guide */}
        <window.ReferenceCard reference={ledger.reference}
          onPatchBill={patchBill} onAddBill={addBill} onDeleteBill={deleteBill} />

        {/* fuel log */}
        <window.FuelLog fuel={ledger.fuel || []}
          onPatch={patchFuel} onAdd={addFuel} onDelete={deleteFuel} />

        {/* truck maintenance */}
        <window.MaintenanceCard maintenance={ledger.maintenance}
          onPatchMeta={patchMaint} onPatchItem={patchMaintItem}
          onAddItem={addMaintItem} onDeleteItem={deleteMaintItem} />

        {/* upcoming one-time expenses */}
        <window.UpcomingCard upcoming={ledger.upcoming}
          onPatchItem={patchUpcoming} onAddItem={addUpcoming} onDeleteItem={deleteUpcoming} />

        {/* days */}
        {computed.days.map(d => (
          <window.DayBlock key={d.id} day={d}
            onPatchDay={patchDay} onDeleteDay={deleteDay}
            onPatchLine={patchLine} onDeleteLine={deleteLine} onAddLine={addLine} />
        ))}

        <button className="add-day" onClick={addDay} type="button">+ Add a day</button>

        {/* end position */}
        <div className="totals">
          <h3>Current Position</h3>
          <div className="totals-grid">
            <div className="totals-row"><span>Business checking</span><strong>{fmtMoney(computed.summary.endBiz)}</strong></div>
            <div className="totals-row"><span>Personal checking</span><strong>{fmtMoney(computed.summary.endPersonal)}</strong></div>
            <div className="totals-row"><span>Pending (not yet usable)</span><strong>{fmtMoney(computed.summary.endPending)}</strong></div>
            <div className="totals-row"><span>Savings pot</span><strong>{fmtMoney(computed.summary.endSavings)}</strong></div>
            <div className="totals-row"><span>IRS paid to date</span><strong>{fmtMoney(computed.summary.irsPaid)}</strong></div>
            <div className="totals-row grand"><span><strong>Total cushion (Business + Personal)</strong></span><strong>{fmtMoney(computed.summary.cushion)}</strong></div>
          </div>
        </div>
      </div>

      <div className={'toast' + (toast ? ' show' : '')}>{toast}</div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
/* Self-healing: remove any old service worker + caches that may be serving a
   stale (unstyled) version. This guarantees a fresh load every time. */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function (regs) {
    regs.forEach(function (r) { r.unregister(); });
  }).catch(function () {});
}
if (window.caches && caches.keys) {
  caches.keys().then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); }).catch(function () {});
}
</script>
</body>
</html>
